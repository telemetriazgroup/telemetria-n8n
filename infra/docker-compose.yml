# Stack telemetría — 161.132.53.51
#   n8n              → :7001  (raíz /)
#   control-correo   → :7201  (UI React + API /api)
#   Adminer          → :7901  (UI PostgreSQL)
#   Postgres         → solo red Docker (sin puerto público)
#
#   cp .env.example .env && docker compose up -d

networks:
  telemetria-net:
    name: telemetria-net

services:
  postgres-telemetria:
    image: postgres:16-alpine
    container_name: postgres-telemetria
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemetria
      POSTGRES_USER: telemetria_app
      POSTGRES_PASSWORD: ${TELEMETRIA_DB_PASSWORD:?Define TELEMETRIA_DB_PASSWORD en .env}
      TZ: ${TZ:-America/Lima}
    volumes:
      - postgres_telemetria_data:/var/lib/postgresql/data
      # Tablas email_trace / email_attachment_ref al primer arranque
      - ../schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./postgres/06-control-correo.sql:/docker-entrypoint-initdb.d/06-control-correo.sql:ro
    networks:
      - telemetria-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetria_app -d telemetria"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer-telemetria:
    image: adminer:4
    container_name: adminer-telemetria
    restart: unless-stopped
    ports:
      - "7901:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-telemetria
    networks:
      - telemetria-net
    depends_on:
      postgres-telemetria:
        condition: service_healthy

  n8n-telemetria:
    image: n8nio/n8n:latest
    container_name: n8n-telemetria
    restart: unless-stopped
    ports:
      - "7001:5678"
    volumes:
      - n8n_telemetria_data:/home/node/.n8n
    env_file:
      - .env
    environment:
      N8N_HOST: ${N8N_HOST:-ztrack.app}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PATH: ${N8N_PATH:-/automatico/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://ztrack.app/automatico/}
      WEBHOOK_URL: ${WEBHOOK_URL:-https://ztrack.app/automatico/}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-1}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Lima}
      TZ: ${TZ:-America/Lima}
      # Referencia para credenciales n8n (no las crea automáticamente)
      TELEMETRIA_DB_HOST: postgres-telemetria
      TELEMETRIA_DB_PORT: "5432"
      TELEMETRIA_DB_NAME: telemetria
      TELEMETRIA_DB_USER: telemetria_app
      TELEMETRIA_DB_PASSWORD: ${TELEMETRIA_DB_PASSWORD}
    networks:
      - telemetria-net
    depends_on:
      postgres-telemetria:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  control-correo-api:
    build:
      context: ../control_correo/backend
      dockerfile: Dockerfile
    container_name: control-correo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://telemetria_app:${TELEMETRIA_DB_PASSWORD}@postgres-telemetria:5432/telemetria
      N8N_BASE_URL: http://n8n-telemetria:5678
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WORKFLOW_ID: ${N8N_WORKFLOW_ID:-}
      N8N_WEBHOOK_PATH: ${N8N_WEBHOOK_PATH:-historico-run}
      CONTROL_POLL_INTERVAL_SEC: ${CONTROL_POLL_INTERVAL_SEC:-600}
      CONTROL_WATCHDOG_INTERVAL_SEC: ${CONTROL_WATCHDOG_INTERVAL_SEC:-120}
      CONTROL_EXEC_TIMEOUT_MIN: ${CONTROL_EXEC_TIMEOUT_MIN:-10}
      SCHEDULER_ENABLED: ${CONTROL_SCHEDULER_ENABLED:-true}
      PROGRAM_RANGE_START: ${PROGRAM_RANGE_START:-2025-01-01}
      PROGRAM_RANGE_END: ${PROGRAM_RANGE_END:-2026-06-30}
      CORS_ORIGINS: ${CONTROL_CORS_ORIGINS:-http://localhost:7201,http://161.132.53.51:7201}
    networks:
      - telemetria-net
    depends_on:
      postgres-telemetria:
        condition: service_healthy
      n8n-telemetria:
        condition: service_healthy

  control-correo-web:
    build:
      context: ../control_correo/frontend
      dockerfile: Dockerfile
    container_name: control-correo-web
    restart: unless-stopped
    ports:
      - "7201:80"
    networks:
      - telemetria-net
    depends_on:
      - control-correo-api

volumes:
  n8n_telemetria_data:
    name: n8n_telemetria_data
  postgres_telemetria_data:
    name: postgres_telemetria_data
