# Proxy inverso n8n telemetría — instalar en el servidor ztrack.app
# Expone: https://ztrack.app/automatico/  →  http://161.132.53.51:7001/automatico/
#
# Instalación (en ztrack.app):
#   sudo cp apache-ztrack-automatico.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
#   sudo a2ensite apache-ztrack-automatico.conf   # o incluir en el vhost de ztrack.app
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Si ya tienes un VirtualHost *:443 para ztrack.app, copia solo el bloque
# <Location /automatico/> ... </Location> dentro de ese vhost.

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ztrack.app

    SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/ztrack.app/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/ztrack.app/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "ztrack.app"

    # ── WebSocket (UI n8n) — debe ir antes del ProxyPass genérico ────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/automatico/(.*) ws://161.132.53.51:7001/automatico/$1 [P,L]

    # ── HTTP ───────────────────────────────────────────────────────────────
    ProxyPass        /automatico/ http://161.132.53.51:7001/automatico/
    ProxyPassReverse /automatico/ http://161.132.53.51:7001/automatico/

    # Push explícito (algunas versiones de n8n)
    ProxyPass        /automatico/rest/push ws://161.132.53.51:7001/automatico/rest/push
    ProxyPassReverse /automatico/rest/push ws://161.132.53.51:7001/automatico/rest/push

    # Timeouts generosos para ejecuciones largas de workflows
    ProxyTimeout 300

    ErrorLog ${APACHE_LOG_DIR}/ztrack-automatico-error.log
    CustomLog ${APACHE_LOG_DIR}/ztrack-automatico-access.log combined
</VirtualHost>
</IfModule>

# Fragmento alternativo si ztrack.app ya tiene VirtualHost :443
