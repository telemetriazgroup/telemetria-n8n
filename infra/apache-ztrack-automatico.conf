# Proxy inverso n8n telemetría — instalar en el servidor ztrack.app
#
# Patrón oficial n8n (subfolder): el proxy QUITA /automatico/ antes de llegar
# al contenedor. n8n corre en la raíz (/) internamente; N8N_PATH solo indica
# al frontend qué prefijo usar en URLs públicas.
#
#   Browser:  https://ztrack.app/automatico/static/base-path.js
#   Apache:   http://161.132.53.51:7001/static/base-path.js   ← sin /automatico/
#
# NO usar: http://161.132.53.51:7001/automatico/  (eso da 404 — es normal)
# URL pública correcta: https://ztrack.app/automatico/
#
# Instalación (en ztrack.app):
#   Integrar el bloque <Location /automatico/> en el VirtualHost *:443 de ztrack.app
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
#   sudo apache2ctl configtest && sudo systemctl reload apache2

# ── Fragmento para incluir DENTRO del VirtualHost :443 existente de ztrack.app ──

# <Location /automatico/>
#     RequestHeader set X-Forwarded-Proto "https"
#     RequestHeader set X-Forwarded-Host "ztrack.app"
#     ProxyPreserveHost On
#
#     # WebSocket — quita prefijo /automatico/ al reenviar
#     RewriteEngine On
#     RewriteCond %{HTTP:Upgrade} websocket [NC]
#     RewriteCond %{HTTP:Connection} upgrade [NC]
#     RewriteRule ^/automatico/?(.*) ws://161.132.53.51:7001/$1 [P,L]
#
#     # HTTP — strip prefix (NO reenviar /automatico/ al backend)
#     ProxyPass        http://161.132.53.51:7001/
#     ProxyPassReverse http://161.132.53.51:7001/
#
#     ProxyTimeout 300
# </Location>

# ── VirtualHost de ejemplo (solo si ztrack.app no tiene otro vhost :443) ────────

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ztrack.app

    SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/ztrack.app/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/ztrack.app/privkey.pem

    # ... resto de la config de ztrack.app (DocumentRoot, etc.) ...

    # ── n8n telemetría ───────────────────────────────────────────────────────
    <Location /automatico/>
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "ztrack.app"
        ProxyPreserveHost On

        RewriteEngine On
        RewriteCond %{HTTP:Upgrade} websocket [NC]
        RewriteCond %{HTTP:Connection} upgrade [NC]
        RewriteRule ^/automatico/?(.*) ws://161.132.53.51:7001/$1 [P,L]

        ProxyPass        http://161.132.53.51:7001/
        ProxyPassReverse http://161.132.53.51:7001/

        ProxyTimeout 300
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/ztrack-automatico-error.log
    CustomLog ${APACHE_LOG_DIR}/ztrack-automatico-access.log combined
</VirtualHost>
</IfModule>
