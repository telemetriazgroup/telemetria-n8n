# Proxy inverso n8n telemetría — servidor ztrack.app
#
# Strip-prefix: /automatico/ en el navegador → / en el backend (161.132.53.51:7001)
#
# ORDEN IMPORTANTE: rutas específicas (WebSocket) ANTES del ProxyPass genérico.
#
# Integrar dentro del VirtualHost *:443 de ztrack.app (no duplicar ServerName).

# ── Copiar este bloque dentro del VirtualHost :443 de ztrack.app ─────────────

    RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    RequestHeader set X-Forwarded-Host "ztrack.app"
    ProxyPreserveHost On
    ProxyTimeout 600

    # 1) WebSocket n8n (ejecuciones en vivo — evita "Lost connection to the server")
    ProxyPass        /automatico/rest/push ws://161.132.53.51:7001/rest/push
    ProxyPassReverse /automatico/rest/push ws://161.132.53.51:7001/rest/push

    # 2) HTTP — quita prefijo /automatico/
    ProxyPass        /automatico/ http://161.132.53.51:7001/
    ProxyPassReverse /automatico/ http://161.132.53.51:7001/

# ── VirtualHost de ejemplo completo ───────────────────────────────────────────

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ztrack.app

    SSLEngine on
    # SSLCertificateFile ...
    # SSLCertificateKeyFile ...

    RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    RequestHeader set X-Forwarded-Host "ztrack.app"
    ProxyPreserveHost On
    ProxyTimeout 600

    ProxyPass        /automatico/rest/push ws://161.132.53.51:7001/rest/push
    ProxyPassReverse /automatico/rest/push ws://161.132.53.51:7001/rest/push

    ProxyPass        /automatico/ http://161.132.53.51:7001/
    ProxyPassReverse /automatico/ http://161.132.53.51:7001/

    ErrorLog ${APACHE_LOG_DIR}/ztrack-automatico-error.log
    CustomLog ${APACHE_LOG_DIR}/ztrack-automatico-access.log combined
</VirtualHost>
</IfModule>

# Módulos: proxy proxy_http proxy_wstunnel headers ssl
# sudo apache2ctl configtest && sudo systemctl reload apache2

# Verificar WebSocket (debe fallar con 400/426 sin upgrade, no 404):
#   curl -sI https://ztrack.app/automatico/rest/push
